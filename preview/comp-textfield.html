<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:grid;gap:10px">
    <div>
      <div class="ds-label" style="margin-bottom:4px">Email</div>
      <div style="display:flex;align-items:center;height:40px;padding:0 14px;background:#fff;border:1px solid var(--border-hairline);border-radius:8px;font-size:15px;color:var(--text-primary)" class="pc-mono">auditor@demo.tw</div>
    </div>
    <div>
      <div class="ds-label" style="margin-bottom:4px">說明</div>
      <div style="display:flex;align-items:center;height:40px;padding:0 14px;background:#fff;border:1px solid var(--primary-500);border-radius:8px;box-shadow:var(--focus-ring);font-size:15px;color:var(--text-primary)">本機關已完成年度資產盤點<span style="color:var(--text-primary);margin-left:2px;animation:blink 1s infinite">|</span></div>
      <div class="ds-caption" style="margin-top:4px">focus · primary ring · 18% alpha</div>
    </div>
    <div>
      <div class="ds-label" style="margin-bottom:4px;color:var(--danger-700)">密碼</div>
      <div style="display:flex;align-items:center;height:40px;padding:0 14px;background:#fff;border:1px solid var(--danger-500);border-radius:8px;box-shadow:var(--focus-ring-danger);font-size:15px;color:var(--text-primary)">••••••</div>
      <div class="ds-caption" style="margin-top:4px;color:var(--danger-700)">帳號或密碼錯誤，請再試一次</div>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:12px">TextField · default / focus / error</div>
  <style>@keyframes blink{50%{opacity:0}}</style>
</div></body></html>
