<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    <!-- admin -->
    <div style="text-align:center">
      <div style="position:relative;width:56px;height:56px;margin:0 auto;border-radius:999px;background:var(--primary-600);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;box-shadow:0 0 0 3px var(--primary-300)">林</div>
      <div style="margin-top:10px;font-size:13px;font-weight:500;color:var(--text-primary)">平台管理員</div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted)">ADMIN · primary-400</div>
    </div>
    <div style="text-align:center">
      <div style="position:relative;width:56px;height:56px;margin:0 auto;border-radius:999px;background:var(--sage-600);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;box-shadow:0 0 0 3px var(--sage-300)">陳</div>
      <div style="margin-top:10px;font-size:13px;font-weight:500;color:var(--text-primary)">稽核委員</div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted)">AUDITOR · sage-400</div>
    </div>
    <div style="text-align:center">
      <div style="position:relative;width:56px;height:56px;margin:0 auto;border-radius:999px;background:var(--neutral-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;box-shadow:0 0 0 3px var(--neutral-300)">王</div>
      <div style="margin-top:10px;font-size:13px;font-weight:500;color:var(--text-primary)">填報人</div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted)">RESPONDENT · neutral-300</div>
    </div>
    <div style="text-align:center">
      <div style="position:relative;width:56px;height:56px;margin:0 auto;border-radius:999px;background:var(--warning-600);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;box-shadow:0 0 0 3px var(--warning-400)">張</div>
      <div style="margin-top:10px;font-size:13px;font-weight:500;color:var(--text-primary)">單位主管</div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted)">SUPERVISOR · warning-400</div>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:14px">Role accent · avatar ring · sidebar 3px strip</div>
</div></body></html>
