<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root" style="background:#fafafa">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div style="background:#fff;border:1px solid var(--border-hairline);border-radius:12px;padding:16px">
      <div class="ds-title" style="font-size:15px">填答進度</div>
      <div class="ds-caption" style="margin-top:4px">共 83 題</div>
      <div style="margin-top:10px;height:4px;background:var(--neutral-100);border-radius:999px;overflow:hidden"><div style="width:72%;height:100%;background:var(--primary-600)"></div></div>
      <div class="pc-caption" style="margin-top:8px">elevation 0 · default</div>
    </div>
    <div style="background:#fff;border:1px solid var(--border-hairline);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm)">
      <div class="ds-title" style="font-size:15px">稽核發現</div>
      <div class="ds-caption" style="margin-top:4px">共 7 項 · 待改善 4</div>
      <div style="margin-top:8px"><span class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700)"><span class="chip-dot" style="background:var(--warning-500)"></span>進行中</span></div>
      <div class="pc-caption" style="margin-top:8px">elevation 2 · hover</div>
    </div>
    <div style="background:var(--bg-surface-muted);border:1px solid var(--border-hairline);border-radius:12px;padding:16px">
      <div class="ds-title" style="font-size:15px">改善已通過</div>
      <div class="ds-caption" style="margin-top:4px">剩餘 2 項待審</div>
      <div style="margin-top:10px;font-size:22px;font-weight:600;color:var(--text-primary)" class="pc-mono">2 <span style="font-size:13px;color:var(--text-muted);font-weight:400">/ 4</span></div>
      <div class="pc-caption" style="margin-top:8px">surface muted</div>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:12px">Card · radius 12 · border hairline → subtle on hover</div>
</div></body></html>
