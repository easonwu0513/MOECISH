<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="background:#fff;border:1px solid var(--border-hairline);border-radius:12px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="display:flex;align-items:center;gap:6px;padding:3px 8px;background:var(--neutral-50);border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--neutral-700)">5.1</div>
      <div style="flex:1;font-size:14px;font-weight:500;color:var(--text-primary)">委外業務辦理前，應依風險等級進行風險評估，並作成紀錄</div>
      <span class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700);font-size:11px"><span class="chip-dot" style="background:var(--warning-500)"></span>部分符合</span>
      <span class="chip" style="background:rgba(251,240,240,.7);color:var(--danger-700);font-size:11px">意見 1</span>
    </div>
    <div style="margin-top:10px;padding:10px 12px;background:var(--bg-surface-muted);border-radius:8px;font-size:13px;color:var(--text-secondary);line-height:1.6;border-left:2px solid var(--warning-400)">
      <div style="font-size:11px;color:var(--warning-700);font-weight:500;margin-bottom:3px">委員意見 · 第 1 輪</div>
      委外契約缺風險評估紀錄，請補附 2025 年度之風險評估文件。
    </div>
  </div>
  <div class="pc-caption" style="margin-top:10px">Checklist row · compliance chip + comment thread</div>
</div></body></html>
