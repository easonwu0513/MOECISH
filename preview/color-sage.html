<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div class="pc-row" style="gap:10px;flex-wrap:wrap">
    <div style="text-align:center">
      <div class="sw" style="width:72px;height:72px;background:var(--sage-500)"></div>
      <div class="sw-label"><b>sage-500</b><span>#678669</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;flex:1">
      <div class="sw" style="height:44px;background:var(--sage-50)"></div>
      <div class="sw" style="height:44px;background:var(--sage-100)"></div>
      <div class="sw" style="height:44px;background:var(--sage-200)"></div>
      <div class="sw" style="height:44px;background:var(--sage-300)"></div>
      <div class="sw" style="height:44px;background:var(--sage-400)"></div>
      <div class="sw" style="height:44px;background:var(--sage-500);outline:2px solid var(--sage-200);outline-offset:2px"></div>
      <div class="sw" style="height:44px;background:var(--sage-600)"></div>
      <div class="sw" style="height:44px;background:var(--sage-700)"></div>
      <div class="sw" style="height:44px;background:var(--sage-800)"></div>
    </div>
  </div>
  <div class="pc-row" style="margin-top:14px;justify-content:space-between">
    <div class="pc-caption">Sage · AUDITOR role · Module 2</div>
    <div class="pc-mono" style="font-size:11px;color:var(--text-muted)">50 → 800</div>
  </div>
</div></body></html>
