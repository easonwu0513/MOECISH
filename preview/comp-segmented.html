<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:inline-flex;padding:2px;background:var(--neutral-50);border:1px solid var(--border-hairline);border-radius:10px;gap:2px">
    <button class="btn" style="height:30px;padding:0 14px;background:var(--success-500);color:#fff;border-radius:6px;box-shadow:var(--shadow-xs);font-size:13px">符合</button>
    <button class="btn" style="height:30px;padding:0 14px;background:transparent;color:var(--neutral-600);border-radius:6px;font-size:13px">部分符合</button>
    <button class="btn" style="height:30px;padding:0 14px;background:transparent;color:var(--neutral-600);border-radius:6px;font-size:13px">不符合</button>
    <button class="btn" style="height:30px;padding:0 14px;background:transparent;color:var(--neutral-600);border-radius:6px;font-size:13px">不適用</button>
  </div>
  <div style="margin-top:12px;display:inline-flex;padding:2px;background:var(--neutral-50);border:1px solid var(--border-hairline);border-radius:10px;gap:2px">
    <button class="btn" style="height:30px;padding:0 14px;background:transparent;color:var(--neutral-600);border-radius:6px;font-size:13px">全部</button>
    <button class="btn" style="height:30px;padding:0 14px;background:var(--primary-600);color:#fff;border-radius:6px;box-shadow:var(--shadow-xs);font-size:13px">未作答</button>
    <button class="btn" style="height:30px;padding:0 14px;background:transparent;color:var(--neutral-600);border-radius:6px;font-size:13px">有意見待補</button>
  </div>
  <div class="pc-caption" style="margin-top:14px">Segmented · compliance tones · filter state</div>
</div></body></html>
