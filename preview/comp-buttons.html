<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary">進入稽核週期</button>
    <button class="btn btn-tonal">直接填答</button>
    <button class="btn btn-secondary">取消</button>
    <button class="btn btn-ghost">清除</button>
    <button class="btn btn-success">審核通過</button>
    <button class="btn btn-danger">退回重填</button>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
    <button class="btn btn-primary" style="height:28px;padding:0 10px;font-size:13px;border-radius:6px">xs</button>
    <button class="btn btn-primary" style="height:32px;padding:0 12px;font-size:14px;border-radius:6px">sm</button>
    <button class="btn btn-primary" style="height:36px;padding:0 14px;font-size:14px">md</button>
    <button class="btn btn-primary" style="height:44px;padding:0 20px;font-size:15px">lg</button>
    <button class="btn btn-primary" disabled style="opacity:.5">disabled</button>
  </div>
  <div class="pc-caption" style="margin-top:12px">Button · 7 variants × 4 sizes · press scale .98</div>
</div></body></html>
