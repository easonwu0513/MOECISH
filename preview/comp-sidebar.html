<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root" style="padding:0;background:#fafafa;width:700px">
  <div style="display:flex">
    <aside style="position:relative;width:230px;background:var(--bg-surface-muted);border-right:1px solid var(--border-hairline);height:260px;padding:16px 8px">
      <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sage-400);opacity:.7"></span>
      <div style="padding:0 10px 12px;border-bottom:1px solid var(--border-hairline);display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#5389bd,#27436a);display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg></div>
        <div style="line-height:1.1">
          <div style="font-size:14px;font-weight:600">MOECISH</div>
          <div style="font-size:11px;color:var(--text-muted)">資安稽核管考平台</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;padding:0 14px;margin-bottom:6px;font-weight:500">稽核作業</div>
      <div style="position:relative;display:flex;align-items:center;gap:10px;padding:0 12px;height:34px;border-radius:6px;color:var(--primary-700);font-size:13px;font-weight:500"><span style="position:absolute;left:0;top:7px;bottom:7px;width:2px;background:var(--primary-600);border-radius:999px"></span><span style="color:var(--primary-600)">▦</span>稽核週期</div>
      <div style="display:flex;align-items:center;gap:10px;padding:0 12px;height:34px;border-radius:6px;color:var(--neutral-600);font-size:13px"><span style="color:var(--neutral-400)">△</span>稽核發現</div>
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;padding:0 14px;margin:12px 0 6px;font-weight:500">管理</div>
      <div style="display:flex;align-items:center;gap:10px;padding:0 12px;height:34px;border-radius:6px;color:var(--neutral-600);font-size:13px"><span style="color:var(--neutral-400)">◷</span>審計軌跡</div>
    </aside>
    <div style="flex:1;padding:14px"></div>
  </div>
  <div class="pc-caption" style="padding:12px 26px 16px">Sidebar · 3px role strip · 2px active rail</div>
</div></body></html>
