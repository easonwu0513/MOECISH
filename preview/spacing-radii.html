<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

    <div style="text-align:center"><div style="width:52px;height:52px;background:var(--primary-50);border:1px solid var(--primary-200);border-radius:10px"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">md · 10</div></div>

    <div style="text-align:center"><div style="width:52px;height:52px;background:var(--primary-50);border:1px solid var(--primary-200);border-radius:18px"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">2xl · 18</div></div>
    <div style="text-align:center"><div style="width:52px;height:52px;background:var(--primary-50);border:1px solid var(--primary-200);border-radius:24px"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">3xl · 24</div></div>
