<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <ol style="position:relative;padding-left:24px;margin:0;list-style:none;display:flex;flex-direction:column;gap:14px">
    <span style="position:absolute;left:9px;top:6px;bottom:6px;width:1px;background:var(--neutral-200)"></span>
    <li style="position:relative">
      <span style="position:absolute;left:-24px;top:3px;width:18px;height:18px;border-radius:999px;background:var(--success-500);box-shadow:0 0 0 4px var(--success-100)"></span>
      <div style="font-size:14px;font-weight:500;color:var(--text-primary)">填報人已送出</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:1px" class="pc-mono">2026-03-12 14:22 · 王小明</div>
    </li>
    <li style="position:relative">
      <span style="position:absolute;left:-24px;top:3px;width:18px;height:18px;border-radius:999px;background:var(--primary-500);box-shadow:0 0 0 4px var(--primary-100)"></span>
      <div style="font-size:14px;font-weight:500;color:var(--text-primary)">主管已核可</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:1px" class="pc-mono">2026-03-13 09:05 · 張主任</div>
    </li>
    <li style="position:relative">
      <span style="position:absolute;left:-24px;top:3px;width:18px;height:18px;border-radius:999px;background:var(--sage-500);box-shadow:0 0 0 4px var(--sage-100);animation:ds-soft-pulse 2.2s infinite"></span>
      <div style="font-size:14px;font-weight:500;color:var(--text-primary)">委員審閱中</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:1px" class="pc-mono">2026-03-15 · 陳委員</div>
    </li>
  </ol>
  <style>@keyframes ds-soft-pulse{50%{opacity:.55}}</style>
  <div class="pc-caption" style="margin-top:12px">Timeline · 18px dot · 4px ring · live node pulses</div>
</div></body></html>
