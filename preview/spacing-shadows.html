<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root" style="background:#fafafa">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px">
    <div style="text-align:center"><div style="height:60px;background:#fff;border-radius:10px;box-shadow:var(--shadow-xs);border:1px solid var(--border-hairline)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">xs</div></div>
    <div style="text-align:center"><div style="height:60px;background:#fff;border-radius:10px;box-shadow:var(--shadow-sm)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">sm</div></div>
    <div style="text-align:center"><div style="height:60px;background:#fff;border-radius:10px;box-shadow:var(--shadow)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">base</div></div>
    <div style="text-align:center"><div style="height:60px;background:#fff;border-radius:10px;box-shadow:var(--shadow-md)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">md</div></div>
    <div style="text-align:center"><div style="height:60px;background:#fff;border-radius:10px;box-shadow:var(--shadow-lg)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">lg</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px">
    <div style="text-align:center"><div style="height:50px;background:#fff;border-radius:10px;box-shadow:var(--shadow-xl)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">xl · modals</div></div>
    <div style="text-align:center"><div style="height:50px;background:#fff;border-radius:10px;box-shadow:var(--focus-ring);border:1px solid var(--primary-500)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">focus · 18% primary</div></div>
    <div style="text-align:center"><div style="height:50px;background:#fafafa;border-radius:10px;box-shadow:var(--shadow-inner);border:1px solid var(--border-hairline)"></div><div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:6px">inner-sm</div></div>
  </div>
  <div class="pc-caption" style="margin-top:12px">Shadow · Linear/Notion-grade subtle</div>
</div></body></html>
