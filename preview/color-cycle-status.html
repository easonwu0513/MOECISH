<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px 14px">
    <div class="chip" style="background:var(--neutral-50);color:var(--neutral-700)"><span class="chip-dot" style="background:var(--neutral-400)"></span>草稿</div>
    <div class="chip" style="background:rgba(242,246,251,.6);color:var(--primary-700)"><span class="chip-dot" style="background:var(--primary-500)"></span>填報人已送出</div>
    <div class="chip" style="background:rgba(242,246,251,.6);color:var(--primary-700)"><span class="chip-dot" style="background:var(--primary-500)"></span>主管已核可</div>
    <div class="chip" style="background:rgba(244,247,244,.6);color:var(--sage-700)"><span class="chip-dot" style="background:var(--sage-500)"></span>審閱中</div>
    <div class="chip" style="background:rgba(244,247,244,.6);color:var(--sage-700)"><span class="chip-dot" style="background:var(--sage-500)"></span>實地稽核已排</div>
    <div class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700)"><span class="chip-dot" style="background:var(--warning-500)"></span>委員意見待補</div>
    <div class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700)"><span class="chip-dot" style="background:var(--warning-500)"></span>稽核發現已開立</div>
    <div class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700)"><span class="chip-dot" style="background:var(--warning-500)"></span>改善進行中</div>
    <div class="chip" style="background:rgba(241,247,242,.7);color:var(--success-700)"><span class="chip-dot" style="background:var(--success-500)"></span>已結案</div>
  </div>
  <div class="pc-caption" style="margin-top:16px">Cycle status · 9 states → 5 tones</div>
  <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:4px">neutral · primary · sage · warning · success</div>
</div></body></html>
