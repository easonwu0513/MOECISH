<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div class="pc-grid" style="grid-template-columns:repeat(4,1fr);gap:14px">
    <!-- success -->
    <div>
      <div style="display:flex;gap:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--success-50)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--success-100)"></div>
      </div>
      <div class="sw" style="height:56px;background:var(--success-500);margin-top:3px"></div>
      <div style="display:flex;gap:3px;margin-top:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--success-600)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--success-700)"></div>
      </div>
      <div class="sw-label" style="margin-top:8px"><b>success</b><span>符合 · 通過</span></div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:2px">#5a9e72</div>
    </div>
    <!-- warning -->
    <div>
      <div style="display:flex;gap:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--warning-50)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--warning-100)"></div>
      </div>
      <div class="sw" style="height:56px;background:var(--warning-500);margin-top:3px"></div>
      <div style="display:flex;gap:3px;margin-top:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--warning-600)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--warning-700)"></div>
      </div>
      <div class="sw-label" style="margin-top:8px"><b>warning</b><span>部分符合</span></div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:2px">#d08b3b</div>
    </div>
    <!-- danger -->
    <div>
      <div style="display:flex;gap:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--danger-50)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--danger-100)"></div>
      </div>
      <div class="sw" style="height:56px;background:var(--danger-500);margin-top:3px"></div>
      <div style="display:flex;gap:3px;margin-top:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--danger-600)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--danger-700)"></div>
      </div>
      <div class="sw-label" style="margin-top:8px"><b>danger</b><span>不符合</span></div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:2px">#b8585a</div>
    </div>
    <!-- neutral -->
    <div>
      <div style="display:flex;gap:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--neutral-50)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--neutral-100)"></div>
      </div>
      <div class="sw" style="height:56px;background:var(--neutral-500);margin-top:3px"></div>
      <div style="display:flex;gap:3px;margin-top:3px">
        <div class="sw" style="flex:1;height:14px;background:var(--neutral-700)"></div>
        <div class="sw" style="flex:1;height:14px;background:var(--neutral-900)"></div>
      </div>
      <div class="sw-label" style="margin-top:8px"><b>neutral</b><span>不適用</span></div>
      <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:2px">#6b6b6b</div>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:14px">Semantic · desaturated — compliance levels</div>
</div></body></html>
