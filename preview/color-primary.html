<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div class="pc-row" style="gap:10px; flex-wrap:wrap">
    <div style="text-align:center">
      <div class="sw" style="width:72px;height:72px;background:var(--primary-600)"></div>
      <div class="sw-label"><b>primary-600</b><span>#3e72a8</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px;flex:1">
      <div class="sw" style="height:44px;background:var(--primary-50)"   title="50"></div>
      <div class="sw" style="height:44px;background:var(--primary-100)"  title="100"></div>
      <div class="sw" style="height:44px;background:var(--primary-200)"  title="200"></div>
      <div class="sw" style="height:44px;background:var(--primary-300)"  title="300"></div>
      <div class="sw" style="height:44px;background:var(--primary-400)"  title="400"></div>
      <div class="sw" style="height:44px;background:var(--primary-500)"  title="500"></div>
      <div class="sw" style="height:44px;background:var(--primary-600);outline:2px solid var(--primary-200);outline-offset:2px" title="600"></div>
      <div class="sw" style="height:44px;background:var(--primary-700)"  title="700"></div>
      <div class="sw" style="height:44px;background:var(--primary-800)"  title="800"></div>
      <div class="sw" style="height:44px;background:var(--primary-900)"  title="900"></div>
      <div class="sw" style="height:44px;background:var(--primary-950)"  title="950"></div>
    </div>
  </div>
  <div class="pc-row" style="margin-top:14px;justify-content:space-between">
    <div class="pc-caption">Primary · Clinical Blue</div>
    <div class="pc-mono" style="font-size:11px;color:var(--text-muted)">50 · 100 · 200 · 300 · 400 · 500 · <b style="color:var(--text-secondary)">600</b> · 700 · 800 · 900 · 950</div>
  </div>
</div></body></html>
