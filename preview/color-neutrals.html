<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:grid;grid-template-columns:repeat(14,1fr);gap:3px">
    <div class="sw" style="height:40px;background:var(--neutral-0);border:1px solid var(--border-subtle)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-25)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-50)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-100)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-150)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-200)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-300)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-400)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-500)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-600)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-700)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-800)"></div>
    <div class="sw" style="height:40px;background:var(--neutral-900)"></div>
    <div class="sw" style="height:40px;background:#000"></div>
  </div>
  <div class="pc-mono" style="font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;justify-content:space-between">
    <span>0</span><span>25</span><span>50</span><span>100</span><span>150</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>ink</span>
  </div>
  <div class="pc-row" style="margin-top:14px;gap:10px">
    <div class="sw" style="flex:1;height:50px;background:var(--bg-surface);border:1px solid var(--border-hairline)">
      <div style="font-size:11px;color:var(--text-tertiary);padding:6px 10px">surface · #ffffff</div>
    </div>
    <div class="sw" style="flex:1;height:50px;background:var(--bg-surface-muted)">
      <div style="font-size:11px;color:var(--text-tertiary);padding:6px 10px">muted · #fafafa</div>
    </div>
    <div class="sw" style="flex:1;height:50px;background:var(--bg-surface-sunken)">
      <div style="font-size:11px;color:var(--text-tertiary);padding:6px 10px">sunken · #f5f5f5</div>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:10px">Cool neutrals · white-first surfaces</div>
</div></body></html>
