<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div class="pc-caption" style="margin-bottom:8px">Soft</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="chip" style="background:var(--neutral-50);color:var(--neutral-700)"><span class="chip-dot" style="background:var(--neutral-400)"></span>草稿</span>
    <span class="chip" style="background:rgba(242,246,251,.6);color:var(--primary-700)"><span class="chip-dot" style="background:var(--primary-500)"></span>已送出</span>
    <span class="chip" style="background:rgba(244,247,244,.6);color:var(--sage-700)"><span class="chip-dot" style="background:var(--sage-500)"></span>審閱中</span>
    <span class="chip" style="background:rgba(241,247,242,.7);color:var(--success-700)"><span class="chip-dot" style="background:var(--success-500)"></span>符合</span>
    <span class="chip" style="background:rgba(252,247,235,.7);color:var(--warning-700)"><span class="chip-dot" style="background:var(--warning-500)"></span>部分符合</span>
    <span class="chip" style="background:rgba(251,240,240,.7);color:var(--danger-700)"><span class="chip-dot" style="background:var(--danger-500)"></span>不符合</span>
  </div>
  <div class="pc-caption" style="margin-top:14px;margin-bottom:8px">Outlined</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="chip" style="background:#fff;color:var(--primary-700);box-shadow:inset 0 0 0 1px var(--primary-200)">策略面</span>
    <span class="chip" style="background:#fff;color:var(--sage-700);box-shadow:inset 0 0 0 1px var(--sage-200)">管理面</span>
    <span class="chip" style="background:#fff;color:var(--neutral-700);box-shadow:inset 0 0 0 1px var(--neutral-200)">技術面</span>
  </div>
  <div class="pc-caption" style="margin-top:14px;margin-bottom:8px">Filled</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="chip" style="background:var(--primary-600);color:#fff">平台管理員</span>
    <span class="chip" style="background:var(--sage-600);color:#fff">稽核委員</span>
    <span class="chip" style="background:var(--warning-600);color:#fff">單位主管</span>
  </div>
  <div class="pc-caption" style="margin-top:12px">Chip · soft / outlined / filled · xs / sm / md</div>
</div></body></html>
