<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="pc-root">
  <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <div>
      <div class="pc-mono" style="font-size:24px;font-weight:600;color:var(--text-primary)">72 <span style="font-weight:400;color:var(--text-tertiary);font-size:16px">/ 83</span></div>
      <div class="pc-caption" style="margin-top:2px">tabular-nums · title-lg</div>
    </div>
    <div style="width:1px;height:40px;background:var(--border-hairline)"></div>
    <div>
      <div class="pc-mono" style="font-size:15px;color:var(--text-secondary)">respondent@demo.tw</div>
      <div class="pc-caption" style="margin-top:2px">JetBrains Mono · 15 / 400</div>
    </div>
    <div style="width:1px;height:40px;background:var(--border-hairline)"></div>
    <div style="display:flex;gap:6px">
      <span class="ds-kbd">⌘</span>
      <span class="ds-kbd">K</span>
    </div>
  </div>
  <div style="margin-top:14px;padding:12px 14px;background:var(--bg-surface-muted);border-radius:8px;border:1px solid var(--border-hairline)">
    <div class="pc-mono" style="font-size:13px;color:var(--text-secondary);line-height:1.7">
      <span style="color:var(--text-muted)">{</span><br>
      &nbsp;&nbsp;"cycleId": <span style="color:var(--primary-700)">"ck_2026_nhis"</span>,<br>
      &nbsp;&nbsp;"status": <span style="color:var(--sage-700)">"IN_REVIEW"</span>,<br>
      &nbsp;&nbsp;"filled": <span style="color:var(--text-primary)">72</span>, "total": <span style="color:var(--text-primary)">83</span><br>
      <span style="color:var(--text-muted)">}</span>
    </div>
  </div>
  <div class="pc-caption" style="margin-top:12px">Mono · JetBrains Mono — emails, tokens, keyboard hints</div>
</div></body></html>
