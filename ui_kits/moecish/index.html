<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>MOECISH UI Kit</title>
<link rel="stylesheet" href="styles.css">
<style>
  .kit-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; background: #fff; border: 1px solid var(--border-hairline); border-radius: 999px; box-shadow: var(--shadow-lg); padding: 4px; display: flex; gap: 2px; }
  .kit-nav button { height: 32px; padding: 0 14px; border-radius: 999px; font-size: 13px; color: var(--neutral-600); font-weight: 500; }
  .kit-nav button[data-active="true"] { background: var(--neutral-900); color: #fff; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens-dashboard.jsx"></script>
<script type="text/babel" src="screens-more.jsx"></script>
<script type="text/babel">
  const screens = [
    ['login',     '登入',      () => <LoginScreen/>],
    ['dashboard', '總覽 · 委員', () => <DashboardScreen/>],
    ['cycle',     '週期詳情',  () => <CycleDetailScreen/>],
    ['checklist', '檢核表',    () => <ChecklistScreen/>],
    ['findings',  '稽核發現',  () => <FindingsScreen/>],
  ];
  function App() {
    const initial = localStorage.getItem('moecish-screen') || 'dashboard';
    const [cur, setCur] = React.useState(initial);
    React.useEffect(() => localStorage.setItem('moecish-screen', cur), [cur]);
    const S = (screens.find(s => s[0] === cur) || screens[1])[2];
    return (
      <>
        <S/>
        <nav className="kit-nav no-print">
          {screens.map(([k, label]) => (
            <button key={k} data-active={k === cur ? 'true' : 'false'} onClick={() => setCur(k)}>{label}</button>
          ))}
        </nav>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
